name: auth-service CI

on:
  push:
    branches: [dev]
    paths: [auth-service/**]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: auth-service

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: auth-service/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - run: pnpm test

      - run: pnpm dlx eslint .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: "us-east-1"

      - name: Get ECR URL
        id: ecr
        run: |
          ECR_URL=$(aws ecr describe-repositories --repository-names auth-service \
            --query 'repositories[0].repositoryUri' --output text)
          echo "url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push sha-tagged image
        uses: docker/build-push-action@v6
        with:
          context: auth-service
          push: true
          tags: ${{ steps.ecr.outputs.url }}:sha-${{ github.sha }}

      - name: Update ArgoCD values-dev.yaml
        env:
          ARGOCD_REPO_TOKEN: ${{ secrets.ARGOCD_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${ARGOCD_REPO_TOKEN}@github.com/huzaifa678/SAAS-Continious-Delivery.git /tmp/cd
          cd /tmp/cd

          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          yq -i '.image.repository = "${{ steps.ecr.outputs.url }}"' charts/auth-service/values-dev.yaml
          yq -i '.image.tag = "sha-${{ github.sha }}"' charts/auth-service/values-dev.yaml

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add charts/auth-service/values-dev.yaml
          git commit -m "ci(auth-service): deploy sha-${{ github.sha }} to dev"
          git push
