name: auth-service CI

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths: [auth-service/**]
  pull_request:
    branches: [test, main]
    paths: [auth-service/**]

env:
  IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/auth-service

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: auth-service/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - run: pnpm test

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: get ECR URL
        id: ecr
        run: |
          ECR_URL=$(aws ecr describe-repositories --repository-names auth-service \
            --query 'repositories[0].repositoryUri' --output text)
          echo "url=$ECR_URL" >> $GITHUB_OUTPUT

      - uses: aws-actions/amazon-ecr-login@v2

      - name: build & push image
        uses: docker/build-push-action@v6
        with:
          context: auth-service
          push: true
          tags: ${{ steps.ecr.outputs.url }}:${{ github.sha }}
