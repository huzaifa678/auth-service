name: auth-service Test

on:
  pull_request:
    branches: [test]
    paths: [auth-service/**]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: auth-service

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: auth-service/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - run: pnpm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ECR URL
        id: ecr
        run: |
          ECR_URL=$(aws ecr describe-repositories --repository-names auth-service \
            --query 'repositories[0].repositoryUri' --output text)
          echo "url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retag sha → test
        run: |
          MANIFEST=$(aws ecr batch-get-image --repository-name auth-service \
            --image-ids imageTag=sha-${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image --repository-name auth-service \
            --image-tag test --image-manifest "$MANIFEST"

      - name: Update ArgoCD values-test.yaml
        env:
          ARGOCD_REPO_TOKEN: ${{ secrets.ARGOCD_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${ARGOCD_REPO_TOKEN}@github.com/huzaifa678/SAAS-Continious-Delivery.git /tmp/cd
          cd /tmp/cd

          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          yq -i '.image.authService = "${{ steps.ecr.outputs.url }}:test"' saas-chart/values-test.yaml

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add saas-chart/values-test.yaml
          git commit -m "test(auth-service): promote sha-${{ github.sha }} to test"
          git push
