name: subscription-service CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [subscription-service/**]
  pull_request:
    paths: [subscription-service/**]

env:
  IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/subscription-service

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: subscription-service

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: subscription-service/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build & push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: subscription-service
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:1.0
